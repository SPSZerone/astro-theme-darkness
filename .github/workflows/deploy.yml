name: Deploy to GitHub Pages

on:
  push:
    branches:
      - publish

  workflow_dispatch:

  repository_dispatch:
    types:
      - sps_digital_garden_updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      THEME: "darkness"
      SPS_DG_PATH: "./sps-digital-garden"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.BUILD_PATH }}
          ref: 'publish'

      - name: Prepare Dynamic Environment Variables
        run: |
          echo "BUILD_PATH=./astro-theme-${{ env.THEME }}" >> $GITHUB_ENV

      - name: Checkout sps-digital-garden
        uses: actions/checkout@v4
        with:
          repository: SPSZerone/sps-digital-garden
          ref: main
          path: ${{ env.SPS_DG_PATH }}
          token: ${{ secrets.SPS_DG_PUBLISH_PAT }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          nu-version: '0.112.2'

      - name: "SPS Digital Garden -> scripts/publish.nu"
        run: nu ${{ env.SPS_DG_PATH }}/scripts/publish.nu -s astro -t ${{ env.THEME }} -p ${{ env.BUILD_PATH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro
        run: npm run build
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
